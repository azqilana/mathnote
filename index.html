<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="catatan,slipnote,notebook,pintar,note,harian,hari,portable,online,webnote,smartnote,menghitung,mencatat,catat,hitung,Kalkulator">
    <meta name="description" content="Sebuah noteweb/website catatan tempat menulis catatan atau pengingat yg dapat menghitung juga nilai angka yg tertulis">
    <meta name="author" content="Arjuna Arc">
    <meta name="robots" content="index,follow">
    <meta name="canonical" content="https://matchnote.mazqilana.my.id">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://matchnote.mazqilana.my.id">
    <meta property="og:title" content="MatchNote - Catatan & Kalkulator Pintar">
    <meta property="og:image" content="./note.jpg">
    <link rel="stylesheet" href="style.css" type="text/css" media="all" />
    <title>MatchNote - Catatan & Kalkulator Pintar</title>
  </head>
  <body>
    <span id="notif" class="notif-sukses">Selamat, catatan telah disimpan!</span>

    <header id="top-header">
      <h1>MatchNote</h1>
      <h3>Website Catatan Dan <br>Kalkulator Pintar</h3>
    </header>
        
    <main>
      <section id="catatan" class="catatan">
        <form>
          <fieldset>
            <div class="header-buku">
              <button type="submit" class="btn-simpan">Simpan</button>
              <input type="text" id="judul" name="judul" class="input-judul" placeholder="JUDUL">
              <button type="button" id="btn-tutup-catatan" class="btn-tutup">&times;</button>
            </div>
            
            <div class="wrapper-textarea">
              <textarea id="isi-catatan" name="isi-catatan" class="textarea-buku" placeholder="Tulis catatan dan hitung di sini..."></textarea>
              
              <div id="tooltip-kalkulator" class="tooltip-hitung">
                <span id="teks-hasil-hitung">Hasil: 0</span>
                <button type="button" id="btn-opsi-a">= Hasil</button>
                <button type="button" id="btn-opsi-c">(Hasil)</button>
              </div>
            </div>
          </fieldset>
        </form>
      </section>
      <section id="daftar-catatan" class="kotak-tema daftar-catatan">
      <button class="btn-tambah" id="btn-munculkan">+</button>
          <h3 id="tengah">Daftar Catatan Tersimpan</h3>
        <div id="wadah-list">
        </div>

        <div class="footer-daftar">
          <button type="button" id="btn-batal-hapus" class="btn-batal-hapus">Batal</button>
          <button type="button" id="btn-master-hapus" class="btn-pemicu-hapus">Hapus</button>
        </div>
      </section>
    </main>
    <script src="script.js" type="text/javascript" charset="utf-8"></script>
  </body>
</html>
