name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Create package.json
        run: |
          echo '{
            "name": "mathnote",
            "version": "1.1.0",
            "private": true
          }' > package.json

      - name: Prepare Web Files
        run: |
          mkdir -p www
          cp index.html www/
          cp style.css www/ || true
          cp script.js www/ || true
          cp icon.png www/ || true
          cp *.png www/ || true
          cp *.jpg www/ || true
          cp *.jpeg www/ || true
          cp *.webp www/ || true

      - name: Install Capacitor
        run: |
          npm install @capacitor/core
          npm install @capacitor/cli
          npm install @capacitor/android

      - name: Install Capacitor Assets
        run: |
          npm install @capacitor/assets --save-dev

      - name: Initialize Capacitor
        run: |
          npx cap init MathNote com.mathnote.app --web-dir www

      - name: Add Android Platform
        run: |
          npx cap add android

      - name: Generate App Icons
        run: |
          npx capacitor-assets generate --iconBackgroundColor '#ffffff'

      - name: Sync Android
        run: |
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Show APK Files
        run: |
          find android -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MathNote-APK
          path: android/app/build/outputs/apk/debug/*.apk
