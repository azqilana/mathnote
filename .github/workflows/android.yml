name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Ensure Web Assets Directory Exists
      run: |
        mkdir -p www
        # Memastikan minimal ada index.html di dalam www agar Capacitor tidak komplain
        if [ ! -f www/index.html ]; then
          cp index.html style.css script.js www/ 2>/dev/null || true
        fi

    - name: Sync Capacitor to Android
      run: npx cap sync android

    - name: Set up Android SDK Licenses
      run: yes | source $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Change Directory & Grant Execute Permission for Gradle
      run: chmod +x android/gradlew

    - name: Build Android Release APK
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MatchNote-v1.1.0
        path: android/app/build/outputs/apk/release/app-release-unsigned.apkname: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --no-bin-links

      - name: Sync Capacitor
        run: |
          node node_modules/@capacitor/cli/bin/capacitor sync android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MatchNote-Aplikasi
          path: android/app/build/outputs/apk/debug/app-debug.apk